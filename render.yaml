services:
  - type: web
    name: demo-docker-api2
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: demo-docker-api2-db
          property: connectionString

databases:
  - name: demo-docker-api2-db
    plan: free
    region: singapore
    databaseName: demo_api
    user: demo_user
