services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: demo-docker-api2:local
    container_name: demo-docker-api2
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: 8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=demo_api;Username=demo_user;Password=demo_password
    ports:
      - "5000:8080"
    restart: unless-stopped
