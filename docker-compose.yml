services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: demo-docker-api2:local
    container_name: demo-docker-api2
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: 8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=demo_api;Username=demo_user;Password=demo_password
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: demo-docker-api2-postgres
    environment:
      POSTGRES_DB: demo_api
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d demo_api"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
